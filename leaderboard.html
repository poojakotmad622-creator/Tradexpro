<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TradeX Pro Leaderboard</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#050816;
color:white;
}

header{
background:black;
padding:20px;
text-align:center;
font-size:35px;
font-weight:bold;
color:#ffbb00;
}

.container{
width:90%;
margin:auto;
padding:50px 0;
}

h1{
text-align:center;
color:#ffbb00;
margin-bottom:40px;
}

.card{
background:#111827;
padding:25px;
border-radius:20px;
margin-bottom:20px;
display:flex;
justify-content:space-between;
align-items:center;
box-shadow:0 0 20px rgba(255,187,0,.2);
transition:.3s;
}

.card:hover{
transform:translateY(-5px);
}

.rank{
font-size:30px;
color:#ffbb00;
font-weight:bold;
}

.name{
font-size:22px;
}

.profit{
font-size:22px;
color:#00ff66;
font-weight:bold;
}

</style>
</head>

<body>

<header>
₿ TradeX Pro
</header>

<div class="container">

<h1>🏆 Top Traders Leaderboard</h1>

<div class="card">
<div class="rank">👑 #1</div>
<div class="name">Alex</div>
<div class="profit">+245%</div>
</div>

<div class="card">
<div class="rank">🥈 #2</div>
<div class="name">Pooja</div>
<div class="profit">+218%</div>
</div>

<div class="card">
<div class="rank">🥉 #3</div>
<div class="name">David</div>
<div class="profit">+190%</div>
</div>

<div class="card">
<div class="rank">#4</div>
<div class="name">Michael</div>
<div class="profit">+165%</div>
</div>

<div class="card">
<div class="rank">#5</div>
<div class="name">Sophia</div>
<div class="profit">+148%</div>
</div>

</div>

</body>
</html>
