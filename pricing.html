<!DOCTYPE html>
<html>
<head>
<title>TradeX Pro Plans</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#050816;
color:white;
}

header{
background:black;
padding:20px;
text-align:center;
font-size:35px;
font-weight:bold;
color:#ffbb00;
}

.container{
width:90%;
margin:auto;
padding:60px 0;
}

h1{
text-align:center;
color:#ffbb00;
margin-bottom:50px;
}

.cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
gap:30px;
}

.card{
background:#111827;
padding:40px;
border-radius:20px;
text-align:center;
box-shadow:0 0 20px rgba(255,187,0,.25);
transition:.3s;
}

.card:hover{
transform:translateY(-10px);
}

.card h2{
color:#ffbb00;
margin-bottom:20px;
}

.price{
font-size:50px;
font-weight:bold;
margin-bottom:20px;
}

.card p{
margin:15px 0;
color:#ddd;
}

button{
margin-top:20px;
padding:15px 35px;
background:#ffbb00;
border:none;
border-radius:30px;
font-size:18px;
font-weight:bold;
cursor:pointer;
}

button:hover{
background:white;
}

.vip{
border:2px solid #ffbb00;
}

</style>

</head>

<body>

<header>
₿ TradeX Pro
</header>

<div class="container">

<h1>Premium Plans</h1>

<div class="cards">

<div class="card">

<h2>Basic</h2>

<div class="price">$29</div>

<p>✔ Daily Market Analysis</p>
<p>✔ Telegram Access</p>
<p>✔ Beginner Support</p>

<button>Join Now</button>

</div>

<div class="card vip">

<h2>VIP</h2>

<div class="price">$99</div>

<p>✔ Premium Signals</p>
<p>✔ Portfolio Guidance</p>
<p>✔ 24×7 Support</p>
<p>✔ VIP Community Access</p>

<button>Get VIP</button>

</div>

<div class="card">

<h2>Pro Trader</h2>

<div class="price">$199</div>

<p>✔ All VIP Features</p>
<p>✔ Personal Mentorship</p>
<p>✔ Risk Management</p>
<p>✔ Lifetime Updates</p>

<button>Start Pro</button>

</div>

</div>

</div>

</body>
</html>
