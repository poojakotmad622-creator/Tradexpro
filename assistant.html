<!DOCTYPE html>
<html>
<head>
<title>TradeX Pro AI Assistant</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#050816;
color:white;
}

header{
background:black;
padding:20px;
text-align:center;
font-size:35px;
font-weight:bold;
color:#ffbb00;
}

.container{
width:90%;
margin:auto;
padding:50px 0;
}

.chat-box{
background:#111827;
padding:30px;
border-radius:20px;
box-shadow:0 0 20px rgba(255,187,0,.2);
max-width:700px;
margin:auto;
}

.msg{
background:black;
padding:20px;
border-radius:15px;
margin-bottom:20px;
line-height:1.8;
}

.ai{
color:#ffbb00;
font-weight:bold;
}

.user{
color:#00ff66;
font-weight:bold;
}

</style>
</head>
<body>

<header>
₿ TradeX Pro AI
</header>

<div class="container">

<div class="chat-box">

<div class="msg">
<span class="user">You:</span><br>
Should I buy Bitcoin?
</div>

<div class="msg">
<span class="ai">TradeX AI:</span><br>
Bitcoin trend is bullish 📈.
Consider buying with proper risk management.
Current signal: BUY BTC/USD 🚀
</div>

<div class="msg">
<span class="user">You:</span><br>
Ethereum outlook?
</div>

<div class="msg">
<span class="ai">TradeX AI:</span><br>
Ethereum remains strong 🔥.
Support level is holding and long-term trend is positive.
</div>

</div>

</div>

</body>
</html>
