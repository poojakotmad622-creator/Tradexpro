<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TradeX Pro Profile</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#050816;
color:white;
}

header{
background:black;
padding:20px;
text-align:center;
font-size:35px;
font-weight:bold;
color:#ffbb00;
}

.container{
width:90%;
margin:auto;
padding:50px 0;
}

.profile-card{
max-width:500px;
margin:auto;
background:#111827;
padding:40px;
border-radius:25px;
text-align:center;
box-shadow:0 0 25px rgba(255,187,0,.2);
}

.avatar{
width:120px;
height:120px;
border-radius:50%;
background:#ffbb00;
color:black;
font-size:50px;
font-weight:bold;
display:flex;
justify-content:center;
align-items:center;
margin:auto;
margin-bottom:20px;
}

.name{
font-size:30px;
color:#ffbb00;
margin-bottom:10px;
}

.vip{
background:#ffbb00;
color:black;
display:inline-block;
padding:10px 20px;
border-radius:30px;
font-weight:bold;
margin-bottom:25px;
}

.info{
margin-top:20px;
text-align:left;
line-height:2.5;
font-size:18px;
}

.balance{
margin-top:30px;
background:#0b1220;
padding:20px;
border-radius:20px;
}

.balance h2{
color:#ffbb00;
margin-bottom:10px;
}

.price{
font-size:40px;
font-weight:bold;
}

.logout{
margin-top:30px;
background:red;
color:white;
border:none;
padding:15px 30px;
border-radius:30px;
font-size:18px;
cursor:pointer;
}

</style>
</head>

<body>

<header>
₿ TradeX Pro
</header>

<div class="container">

<div class="profile-card">

<div class="avatar">
P
</div>

<div class="name">
Pooja
</div>

<div class="vip">
⭐ VIP GOLD MEMBER
</div>

<div class="info">

📧 Email :
support@tradexpro.com

<br>

🆔 Member ID :
TXP-847362

<br>

📊 Total Assets :
<span id="assets">0</span>

<br>

📜 Transactions :
<span id="transactions">0</span>

</div>

<div class="balance">

<h2>Wallet Balance</h2>

<div class="price" id="balance">
$0
</div>

</div>

<button class="logout"
onclick="window.location.href='login.html'">
Logout
</button>

</div>

</div>

<script>

let balance = localStorage.getItem("balance") || 100000;
let portfolio = JSON.parse(localStorage.getItem("portfolio")) || [];
let history = JSON.parse(localStorage.getItem("history")) || [];

document.getElementById("balance").innerHTML =
"$" + Number(balance).toLocaleString();

document.getElementById("assets").innerHTML =
portfolio.length;

document.getElementById("transactions").innerHTML =
history.length;

</script>

</body>
</html>
