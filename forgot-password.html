<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Forgot Password | TradeX Pro</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#050816;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
}

.box{
width:430px;
background:#0b1220;
padding:40px;
border-radius:25px;
border:1px solid rgba(255,187,0,.3);
box-shadow:0 0 25px rgba(255,187,0,.2);
text-align:center;
}

.logo{
font-size:60px;
color:#ffbb00;
margin-bottom:15px;
}

h1{
color:#ffbb00;
margin-bottom:15px;
}

p{
color:#aaa;
margin-bottom:30px;
}

.input-box{
position:relative;
margin-bottom:25px;
}

.input-box i{
position:absolute;
left:18px;
top:18px;
color:#ffbb00;
}

.input-box input{
width:100%;
padding:15px 50px;
background:#111827;
border:none;
outline:none;
border-radius:15px;
color:white;
font-size:16px;
}

button{
width:100%;
padding:15px;
background:#ffbb00;
border:none;
border-radius:40px;
font-size:18px;
font-weight:bold;
cursor:pointer;
transition:.3s;
}

button:hover{
background:white;
}

a{
display:block;
margin-top:25px;
text-decoration:none;
color:#ffbb00;
}

</style>
</head>

<body>

<div class="box">

<div class="logo">
🔑
</div>

<h1>Forgot Password</h1>

<p>
Enter your email address to reset your password.
</p>

<div class="input-box">
<i class="fa-solid fa-envelope"></i>
<input type="email" placeholder="Enter Email Address">
</div>

<button>
SEND RESET LINK
</button>

<a href="login.html">
← Back To Login
</a>

</div>

</body>
</html>
